# NATS server with JetStream enabled. Single replica is fine for the
# demo — the email-worker consumer is the SLO-bearing piece, not the
# broker. The gke overlay swaps this for a 3-replica clustered NATS
# with TLS and resource quotas matched to the cluster size.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-conf
data:
  nats.conf: |
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222
    jetstream {
      store_dir: /data
      max_memory_store: 256MB
      max_file_store: 1GB
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels: { app: nats }
  template:
    metadata:
      labels: { app: nats }
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - { name: client,  containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          volumeMounts:
            - { name: conf, mountPath: /etc/nats }
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
      volumes:
        - name: conf
          configMap: { name: nats-conf }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  clusterIP: None
  selector: { app: nats }
  ports:
    - { name: client,  port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
