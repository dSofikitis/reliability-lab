# NATS server with JetStream enabled. Single replica is fine for the
# demo — the email-worker consumer is the SLO-bearing piece, not the
# broker. The gke overlay swaps this for a 3-replica clustered NATS
# with TLS and resource quotas matched to the cluster size.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-conf
data:
  nats.conf: |
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222
    jetstream {
      store_dir: /data
      max_memory_store: 256MB
      max_file_store: 1GB
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels: { app: nats }
  template:
    metadata:
      labels: { app: nats }
      annotations:
        # Scrape the prometheus-nats-exporter sidecar so the
        # nats_consumer_num_pending metric the email-worker SLO
        # depends on actually lands in Prometheus.
        prometheus.io/scrape: "true"
        prometheus.io/port: "7777"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - { name: client,  containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          volumeMounts:
            - { name: conf, mountPath: /etc/nats }
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
        # Sidecar: pull JSON from NATS' /jsz + /varz + /connz
        # endpoints and re-expose them in Prometheus format on :7777.
        # Keeps the NATS image stock and the metrics surface honest.
        - name: exporter
          image: natsio/prometheus-nats-exporter:0.18.0
          args:
            - "-port=7777"
            - "-connz"
            - "-jsz=all"
            - "-varz"
            - "http://localhost:8222"
          ports:
            - { name: metrics, containerPort: 7777 }
          resources:
            requests: { cpu: 10m,  memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: conf
          configMap: { name: nats-conf }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  clusterIP: None
  selector: { app: nats }
  ports:
    - { name: client,  port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
