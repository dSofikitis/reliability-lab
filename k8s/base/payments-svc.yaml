apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-svc
  labels: { app: payments-svc }
spec:
  replicas: 2  # 2 here so HPA-scale remedy has a baseline to grow from
  selector:
    matchLabels: { app: payments-svc }
  template:
    metadata:
      labels: { app: payments-svc }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: payments-svc
          image: ghcr.io/dsofikitis/reliability-lab/payments-svc:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: grpc, containerPort: 9000 }
            - { name: http, containerPort: 8080 }
          env:
            - { name: LISTEN_ADDR_GRPC, value: ":9000" }
            - { name: LISTEN_ADDR_HTTP, value: ":8080" }
            - { name: INVENTORY_ADDR,   value: "inventory-svc:9000" }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits:   { cpu: 1,    memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: payments-svc
spec:
  selector: { app: payments-svc }
  ports:
    - { name: grpc, port: 9000, targetPort: grpc }
    - { name: http, port: 8080, targetPort: http }
---
# HPA does two jobs:
#   1. Steady-state autoscaling on CPU as k6 drives the load curve.
#   2. The control surface for the operator's "scale up" remedy —
#      the remedy bumps minReplicas (NOT spec.replicas, which the HPA
#      would silently revert on its next reconcile). minReplicas
#      coercion is the supported way to push the floor up; the HPA
#      relaxes it back down on its own once load returns to normal.
# Requires metrics-server. maxReplicas caps the operator's blast
# radius — even on repeated alert fires it can't blow past 10 pods.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-svc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
