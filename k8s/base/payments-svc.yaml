apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-svc
  labels: { app: payments-svc }
spec:
  replicas: 2  # 2 here so HPA-scale remedy has a baseline to grow from
  selector:
    matchLabels: { app: payments-svc }
  template:
    metadata:
      labels: { app: payments-svc }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: payments-svc
          image: ghcr.io/dsofikitis/reliability-lab/payments-svc:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: grpc, containerPort: 9000 }
            - { name: http, containerPort: 8080 }
          env:
            - { name: LISTEN_ADDR_GRPC, value: ":9000" }
            - { name: LISTEN_ADDR_HTTP, value: ":8080" }
            - { name: INVENTORY_ADDR,   value: "inventory-svc:9000" }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits:   { cpu: 1,    memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: payments-svc
spec:
  selector: { app: payments-svc }
  ports:
    - { name: grpc, port: 9000, targetPort: grpc }
    - { name: http, port: 8080, targetPort: http }
---
# Scaffolded HPA — kicks in once metrics-server is installed. The
# remediation-operator's "scale up" remedy doesn't touch the HPA min
# directly; it patches the Deployment spec.replicas. The HPA's job
# is to handle the gradual load curve k6 drives; the operator's job
# is the step-function response to a chaos event.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-svc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
