# The workload (Rollout + AnalysisTemplate) lives in
# orders-svc-rollout.yaml — split out so the canary-strategy
# definition is visible on its own. This file keeps the Service
# and the circuit-break ConfigMap, which are shared infrastructure
# the Rollout's pods plug into.
apiVersion: v1
kind: Service
metadata:
  name: orders-svc
spec:
  selector: { app: orders-svc }
  ports:
    - { name: http, port: 8080, targetPort: http }
---
# Circuit-break ConfigMap. The remediation-operator's third remedy
# patches `publish_enabled: "false"` here when the email-worker's
# SLO breaks. orders-svc watches this ConfigMap (phase 9) and pauses
# `js.Publish` calls until the worker drains.
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-svc-flags
data:
  publish_enabled: "true"
