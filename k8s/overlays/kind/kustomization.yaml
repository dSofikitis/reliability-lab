# kind overlay — single-node-friendly tweaks.
#  - imagePullPolicy: Never so kind uses the locally-loaded image
#    instead of pulling from ghcr.io.
#  - replicas tuned down so a 16 GB laptop doesn't groan.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target: { kind: Deployment, name: orders-svc }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target: { kind: Deployment, name: payments-svc }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target: { kind: Deployment, name: inventory-svc }
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target: { kind: Deployment, name: email-worker }
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
