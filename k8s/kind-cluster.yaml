# A small 3-node kind cluster, just big enough to test multi-pod
# scheduling and node-level chaos (pod-kill that depends on draining
# replicas to a different node).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: reliability-lab
nodes:
  - role: control-plane
    extraPortMappings:
      # Expose orders-svc + Grafana + Argo CD via NodePort patches on
      # the kind overlay. hostPort == containerPort everywhere so that
      # the same number works inside and outside the cluster — every
      # docs reference, README echo, k6 BASE_URL, and runbook can use
      # one port consistently. (The previous mapping had hostPort 8080
      # to containerPort 31080, which silently broke every "go to
      # localhost:31080" instruction in the repo.)
      - { containerPort: 31080, hostPort: 31080, protocol: TCP }   # orders-svc
      - { containerPort: 31300, hostPort: 31300, protocol: TCP }   # Grafana
      - { containerPort: 31380, hostPort: 31380, protocol: TCP }   # Argo CD UI
  - role: worker
  - role: worker
